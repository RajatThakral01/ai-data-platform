version: '3.9'

services:

  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai_platform_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - FRONTEND_URL=http://localhost:3000
      - METABASE_SITE_URL=http://ai_platform_metabase:3000
      - METABASE_EMAIL=${METABASE_EMAIL}
      - METABASE_PASSWORD=${METABASE_PASSWORD}
      - METABASE_EMBEDDING_SECRET=${METABASE_EMBEDDING_SECRET}
    volumes:
      - ./streamlit:/streamlit:ro
      - uploads_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: ai_platform_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  streamlit:
    build:
      context: streamlit
      dockerfile: Dockerfile
    container_name: ai_platform_streamlit
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    volumes:
      - chroma_data:/app/chroma_db
      - logs_data:/app/llm_logs.db
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    container_name: ai_platform_metabase
    ports:
      - "3001:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_SITE_URL=http://localhost:3001
      - MB_EMBEDDING_SECRET_KEY=${METABASE_EMBEDDING_SECRET}
      - MB_EMBEDDING_APP_ORIGIN=http://localhost:3000
    volumes:
      - metabase_data:/metabase-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  redis_data:
  uploads_data:
  chroma_data:
  logs_data:
  metabase_data:
